<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="32">
      <stop offset="0" stop-color="#070c26"/>
      <stop offset="1" stop-color="#172254"/>
    </linearGradient>
    <radialGradient id="moonglow" gradientUnits="userSpaceOnUse" cx="16" cy="16" r="14">
      <stop offset="0" stop-color="#dde5ff" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#dde5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#sky)"/>
  <!-- crescent (base disc minus offset bite), centroid ≈ (16, 16) -->
  <circle cx="18" cy="14.3" r="7" fill="#f0eee2" opacity="0.92"/>
  <circle cx="21.3" cy="11.4" r="7" fill="url(#sky)"/>
  <!-- glow drawn over the bite so its edge melts into the sky -->
  <rect width="32" height="32" rx="7" fill="url(#moonglow)"/>
  <!-- diamond sparkles -->
  <path d="M8.5 6.2 L9 7.7 L10.5 8.2 L9 8.7 L8.5 10.2 L8 8.7 L6.5 8.2 L8 7.7 Z" fill="#eef2ff" opacity="0.9"/>
